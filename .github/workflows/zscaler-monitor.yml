name: Zscaler Release Monitor

on:
  schedule:
    # 毎日 09:00 JST (00:00 UTC) に実行
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      month_filter:
        description: "対象月 (例: May, June)"
        required: false
        default: "May"

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install playwright requests beautifulsoup4
          playwright install chromium
          playwright install-deps chromium

      - name: Run Zscaler monitor
        env:
          GMAIL_ADDRESS:           ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD:      ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL:         ${{ secrets.RECIPIENT_EMAIL }}
          ONEDRIVE_CLIENT_ID:      ${{ secrets.ONEDRIVE_CLIENT_ID }}
          ONEDRIVE_CLIENT_SECRET:  ${{ secrets.ONEDRIVE_CLIENT_SECRET }}
          ONEDRIVE_REFRESH_TOKEN:  ${{ secrets.ONEDRIVE_REFRESH_TOKEN }}
          MONTH_FILTER:            ${{ github.event.inputs.month_filter || 'May' }}
        run: |
          python scripts/zscaler_monitor.py

      - name: Upload generated notes as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fleeting-notes
          path: output/fleeting_notes/
          if-no-files-found: ignore
