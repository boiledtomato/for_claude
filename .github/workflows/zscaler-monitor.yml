name: Zscaler Release Monitor

on:
  schedule:
    # 毎日 09:00 JST (00:00 UTC) に実行
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      month_filter:
        description: "対象月 (例: May, June, July)"
        required: false
        default: "May"

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write   # seen状態ファイルをコミットするために必要

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install playwright beautifulsoup4
          playwright install chromium
          playwright install-deps chromium

      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      - name: Configure rclone from secret
        env:
          RCLONE_CONFIG: ${{ secrets.RCLONE_CONFIG }}
        run: |
          mkdir -p ~/.config/rclone
          echo "$RCLONE_CONFIG" > ~/.config/rclone/rclone.conf

      - name: Run Zscaler monitor
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL_FROM:  ${{ secrets.NOTIFY_EMAIL_FROM }}
          MONTH_FILTER:       ${{ github.event.inputs.month_filter || 'May' }}
        run: |
          python scripts/zscaler_monitor.py

      - name: Save seen articles state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/zscaler_seen.json || true
          git diff --cached --quiet || git commit -m "chore: update zscaler seen articles state"
          git push || true

      - name: Upload debug HTML and notes as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zscaler-output-${{ github.run_number }}
          path: |
            output/debug_page.html
            output/fleeting_notes/
          if-no-files-found: ignore
