name: URL Lookup データ自動更新

on:
  schedule:
    # 毎日 JST 0:00 (UTC 15:00)
    - cron: "0 15 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-url-lookup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run URL Lookup updater
        env:
          VIRUSTOTAL_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
        run: python scripts/update_url_lookup.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/url-lookup.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: URL Lookup データ更新 $(date -u '+%Y-%m-%d')"
            git push origin HEAD
          fi

      - name: Generate email report
        run: python scripts/generate_email_report.py > /tmp/email_body.txt

      - name: Set report date
        id: date
        run: echo "today=$(date -u '+%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Send update report email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "[URL Lookup] データ更新レポート ${{ steps.date.outputs.today }}"
          to: ciderred1239@gmail.com
          from: "Zscaler Hub <ciderred1239@gmail.com>"
          body: file:///tmp/email_body.txt
