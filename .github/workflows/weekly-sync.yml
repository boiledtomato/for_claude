name: Zscaler Help → NotebookLM 週次同期

on:
  schedule:
    # 毎週月曜 9:00 JST (00:00 UTC)
    - cron: "0 0 * * 1"
  workflow_dispatch:
    inputs:
      categories:
        description: "対象カテゴリ (スペース区切り、省略時は全カテゴリ)"
        required: false
        default: ""
      force:
        description: "ハッシュ比較を無視して強制再生成する"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    # help.zscaler.comはJSレンダリングのSPAのためPlaywrightでレンダリングする。
    # scraper.pyはMAX_CONCURRENCY(既定5)で並列化しているが、実サイトマップでは
    # 全カテゴリ合計で約2,650対象ページ(2026-07-16調査時点)あり、
    # 概算スループット(~1ページ/秒)でも1時間前後かかりうるため長めに確保。
    timeout-minutes: 150

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyyaml requests readability-lxml lxml playwright \
                      google-api-python-client google-auth google-auth-httplib2
          playwright install chromium
          playwright install-deps chromium

      - name: Run weekly sync
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          SYNC_CATEGORIES: ${{ github.event.inputs.categories }}
          SYNC_FORCE: ${{ github.event.inputs.force }}
        run: |
          ARGS=()
          if [ -n "$SYNC_CATEGORIES" ]; then
            ARGS+=(--categories $SYNC_CATEGORIES)
          fi
          if [ "$SYNC_FORCE" = "true" ]; then
            ARGS+=(--force)
          fi
          python main.py "${ARGS[@]}"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::週次NotebookLM同期に失敗しました。ログを確認してください。"

      - name: Commit updated state and changelog
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json changelog.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: NotebookLM sync $(date -u '+%Y-%m-%d')"
            git push origin HEAD
          fi
