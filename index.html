<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zscaler 学習ダッシュボード</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #263448;
      --border: #334155;
      --primary: #38bdf8;
      --primary-dark: #0ea5e9;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --green: #34d399;
      --orange: #fb923c;
      --purple: #a78bfa;
      --red: #f87171;
      --tag-zia: #0ea5e9;
      --tag-zpa: #a78bfa;
      --tag-zdx: #34d399;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,.4);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #0c1a36 0%, #0f2457 100%);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 20px rgba(0,0,0,.5);
    }
    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 16px;
      height: 64px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 900;
      color: #fff;
      flex-shrink: 0;
    }
    .logo-text {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
    }
    .logo-sub {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 400;
    }
    .header-search {
      flex: 1;
      max-width: 400px;
      position: relative;
      margin-left: auto;
    }
    .header-search input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px 8px 36px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }
    .header-search input:focus { border-color: var(--primary); }
    .header-search input::placeholder { color: var(--text-muted); }
    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 14px;
    }
    .last-updated {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── Layout ── */
    .layout {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 24px;
      align-items: start;
    }

    /* ── Sidebar ── */
    .sidebar {
      position: sticky;
      top: 88px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .sidebar-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }
    .sidebar-card h3 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-muted);
      margin-bottom: 10px;
    }
    .filter-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 8px 10px;
      border: none;
      background: transparent;
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 14px;
      cursor: pointer;
      text-align: left;
      transition: all .15s;
    }
    .filter-btn:hover { background: var(--surface2); color: var(--text); }
    .filter-btn.active { background: rgba(56,189,248,.12); color: var(--primary); font-weight: 600; }
    .filter-btn .count {
      margin-left: auto;
      font-size: 11px;
      background: var(--surface2);
      border-radius: 10px;
      padding: 1px 7px;
      color: var(--text-muted);
    }
    .filter-btn.active .count { background: rgba(56,189,248,.2); color: var(--primary); }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-all { background: var(--text-muted); }
    .dot-product { background: var(--orange); }
    .dot-tech { background: var(--green); }
    .dot-news { background: var(--purple); }

    .tag-pill {
      display: inline-flex;
      align-items: center;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: all .15s;
      margin: 3px 3px 3px 0;
    }
    .tag-pill:hover { opacity: .85; }
    .tag-pill.pill-all { background: var(--surface2); color: var(--text-muted); border-color: var(--border); }
    .tag-pill.pill-all.active { background: rgba(148,163,184,.15); color: var(--text); border-color: var(--text-muted); }
    .tag-pill.pill-zia { background: rgba(14,165,233,.1); color: var(--tag-zia); border-color: rgba(14,165,233,.3); }
    .tag-pill.pill-zia.active { background: rgba(14,165,233,.25); border-color: var(--tag-zia); }
    .tag-pill.pill-zpa { background: rgba(167,139,250,.1); color: var(--tag-zpa); border-color: rgba(167,139,250,.3); }
    .tag-pill.pill-zpa.active { background: rgba(167,139,250,.25); border-color: var(--tag-zpa); }
    .tag-pill.pill-zdx { background: rgba(52,211,153,.1); color: var(--tag-zdx); border-color: rgba(52,211,153,.3); }
    .tag-pill.pill-zdx.active { background: rgba(52,211,153,.25); border-color: var(--tag-zdx); }

    /* ── Stats ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .stat-item {
      text-align: center;
      padding: 10px 4px;
    }
    .stat-num { font-size: 22px; font-weight: 700; color: var(--primary); }
    .stat-label { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

    /* ── Main content ── */
    main { min-width: 0; }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .result-count { font-size: 13px; color: var(--text-muted); }
    .sort-select {
      margin-left: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      padding: 6px 10px;
      cursor: pointer;
      outline: none;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      transition: transform .15s, box-shadow .15s, border-color .15s;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
      border-color: rgba(56,189,248,.3);
    }
    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .category-badge {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      padding: 2px 8px;
      border-radius: 4px;
    }
    .badge-product { background: rgba(251,146,60,.15); color: var(--orange); }
    .badge-tech    { background: rgba(52,211,153,.15);  color: var(--green); }
    .badge-news    { background: rgba(167,139,250,.15); color: var(--purple); }
    .card-source { font-size: 12px; color: var(--text-muted); }
    .card-date   { font-size: 12px; color: var(--text-muted); margin-left: auto; }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.4;
    }
    .card-title a {
      color: inherit;
      text-decoration: none;
      transition: color .15s;
    }
    .card-title a:hover { color: var(--primary); }

    .card-summary {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-footer {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .tag {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
    }
    .tag-zia { background: rgba(14,165,233,.15); color: var(--tag-zia); }
    .tag-zpa { background: rgba(167,139,250,.15); color: var(--tag-zpa); }
    .tag-zdx { background: rgba(52,211,153,.15);  color: var(--tag-zdx); }
    .read-more {
      margin-left: auto;
      font-size: 12px;
      color: var(--primary);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 3px;
      transition: gap .15s;
    }
    .read-more:hover { gap: 6px; }

    /* ── States ── */
    .state-center {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      gap: 16px;
      color: var(--text-muted);
      text-align: center;
    }
    .state-icon { font-size: 48px; }
    .state-title { font-size: 18px; font-weight: 600; color: var(--text); }
    .state-msg { font-size: 14px; max-width: 360px; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .manual-btn {
      background: rgba(56,189,248,.15);
      border: 1px solid rgba(56,189,248,.3);
      color: var(--primary);
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 13px;
      cursor: pointer;
      transition: background .15s;
    }
    .manual-btn:hover { background: rgba(56,189,248,.25); }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { position: static; }
    }
    @media (max-width: 600px) {
      .header-inner { gap: 10px; }
      .logo-sub { display: none; }
      .header-search { max-width: 160px; }
      .layout { padding: 12px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">Z</div>
      <div>
        <div class="logo-text">Zscaler Dashboard</div>
        <div class="logo-sub">学習・情報収集ツール</div>
      </div>
    </div>
    <div class="header-search">
      <span class="search-icon">🔍</span>
      <input type="text" id="search" placeholder="記事を検索…" autocomplete="off">
    </div>
    <div class="last-updated" id="last-updated">読み込み中…</div>
  </div>
</header>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-card">
      <h3>カテゴリ</h3>
      <button class="filter-btn active" data-cat="all">
        <span class="dot dot-all"></span>すべて
        <span class="count" id="cnt-all">0</span>
      </button>
      <button class="filter-btn" data-cat="product_update">
        <span class="dot dot-product"></span>製品アップデート
        <span class="count" id="cnt-product">0</span>
      </button>
      <button class="filter-btn" data-cat="tech_blog">
        <span class="dot dot-tech"></span>技術ブログ
        <span class="count" id="cnt-tech">0</span>
      </button>
      <button class="filter-btn" data-cat="industry_news">
        <span class="dot dot-news"></span>業界ニュース
        <span class="count" id="cnt-news">0</span>
      </button>
    </div>

    <div class="sidebar-card">
      <h3>製品タグ</h3>
      <div>
        <span class="tag-pill pill-all active" data-tag="all">すべて</span>
        <span class="tag-pill pill-zia" data-tag="ZIA">ZIA</span>
        <span class="tag-pill pill-zpa" data-tag="ZPA">ZPA</span>
        <span class="tag-pill pill-zdx" data-tag="ZDX">ZDX</span>
      </div>
    </div>

    <div class="sidebar-card">
      <h3>統計</h3>
      <div class="stats-grid" id="stats">
        <div class="stat-item"><div class="stat-num" id="s-total">0</div><div class="stat-label">記事数</div></div>
        <div class="stat-item"><div class="stat-num" id="s-zia">0</div><div class="stat-label">ZIA</div></div>
        <div class="stat-item"><div class="stat-num" id="s-zpa">0</div><div class="stat-label">ZPA</div></div>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main>
    <div class="toolbar">
      <div class="result-count" id="result-count"></div>
      <select class="sort-select" id="sort">
        <option value="date-desc">最新順</option>
        <option value="date-asc">古い順</option>
      </select>
    </div>
    <div class="grid" id="grid">
      <div class="state-center">
        <div class="spinner"></div>
        <div class="state-title">データを読み込み中…</div>
      </div>
    </div>
  </main>
</div>

<script>
  const CATEGORY_LABEL = {
    product_update: "製品アップデート",
    tech_blog: "技術ブログ",
    industry_news: "業界ニュース",
  };
  const CATEGORY_CLASS = {
    product_update: "badge-product",
    tech_blog: "badge-tech",
    industry_news: "badge-news",
  };

  let allArticles = [];
  let activeCat = "all";
  let activeTag = "all";
  let searchQuery = "";
  let sortOrder = "date-desc";

  function formatDate(iso) {
    try {
      return new Date(iso).toLocaleDateString("ja-JP", {
        year: "numeric", month: "short", day: "numeric"
      });
    } catch { return iso?.slice(0, 10) || ""; }
  }

  function formatTs(iso) {
    try {
      return new Date(iso).toLocaleString("ja-JP", {
        year: "numeric", month: "short", day: "numeric",
        hour: "2-digit", minute: "2-digit"
      });
    } catch { return iso || ""; }
  }

  function filtered() {
    let list = allArticles;
    if (activeCat !== "all") list = list.filter(a => a.category === activeCat);
    if (activeTag !== "all") list = list.filter(a => (a.tags || []).includes(activeTag));
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      list = list.filter(a =>
        a.title.toLowerCase().includes(q) ||
        (a.summary || "").toLowerCase().includes(q) ||
        a.source.toLowerCase().includes(q)
      );
    }
    if (sortOrder === "date-asc") list = [...list].sort((a, b) => a.date.localeCompare(b.date));
    return list;
  }

  function renderCard(a) {
    const tags = (a.tags || []).map(t =>
      `<span class="tag tag-${t.toLowerCase()}">${t}</span>`
    ).join("");
    const catClass = CATEGORY_CLASS[a.category] || "badge-news";
    const catLabel = CATEGORY_LABEL[a.category] || a.category;
    const summary = a.summary
      ? `<div class="card-summary">${escHtml(a.summary)}</div>` : "";
    return `
      <article class="card">
        <div class="card-meta">
          <span class="category-badge ${catClass}">${catLabel}</span>
          <span class="card-source">${escHtml(a.source)}</span>
          <span class="card-date">${formatDate(a.date)}</span>
        </div>
        <div class="card-title"><a href="${escHtml(a.url)}" target="_blank" rel="noopener">${escHtml(a.title)}</a></div>
        ${summary}
        <div class="card-footer">
          ${tags}
          <a class="read-more" href="${escHtml(a.url)}" target="_blank" rel="noopener">続きを読む →</a>
        </div>
      </article>`;
  }

  function escHtml(s) {
    return (s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function renderEmpty() {
    return `
      <div class="state-center">
        <div class="state-icon">📭</div>
        <div class="state-title">記事が見つかりません</div>
        <div class="state-msg">フィルターや検索条件を変えてみてください。</div>
      </div>`;
  }

  function renderNoData() {
    return `
      <div class="state-center">
        <div class="state-icon">🔄</div>
        <div class="state-title">初回データ取得が必要です</div>
        <div class="state-msg">
          GitHub Actions の「Daily Zscaler Update」ワークフローを手動で実行してください。<br><br>
          リポジトリの Actions タブ → Daily Zscaler Update → Run workflow
        </div>
      </div>`;
  }

  function updateCounts() {
    const counts = { all: allArticles.length, product_update: 0, tech_blog: 0, industry_news: 0 };
    allArticles.forEach(a => { if (counts[a.category] !== undefined) counts[a.category]++; });
    document.getElementById("cnt-all").textContent = counts.all;
    document.getElementById("cnt-product").textContent = counts.product_update;
    document.getElementById("cnt-tech").textContent = counts.tech_blog;
    document.getElementById("cnt-news").textContent = counts.industry_news;

    const zia = allArticles.filter(a => (a.tags||[]).includes("ZIA")).length;
    const zpa = allArticles.filter(a => (a.tags||[]).includes("ZPA")).length;
    document.getElementById("s-total").textContent = counts.all;
    document.getElementById("s-zia").textContent = zia;
    document.getElementById("s-zpa").textContent = zpa;
  }

  function render() {
    const list = filtered();
    const grid = document.getElementById("grid");
    document.getElementById("result-count").textContent =
      `${list.length} 件の記事`;

    if (allArticles.length === 0) {
      grid.innerHTML = renderNoData();
      return;
    }
    if (list.length === 0) {
      grid.innerHTML = renderEmpty();
      return;
    }
    grid.innerHTML = list.map(renderCard).join("");
  }

  async function loadData() {
    try {
      const resp = await fetch("data/articles.json?t=" + Date.now());
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();
      allArticles = data.articles || [];
      const lastUp = data.last_updated
        ? "最終更新: " + formatTs(data.last_updated)
        : "";
      document.getElementById("last-updated").textContent = lastUp;
    } catch (e) {
      console.error("Failed to load articles:", e);
      document.getElementById("last-updated").textContent = "データ読み込みエラー";
    }
    updateCounts();
    render();
  }

  // Category filter
  document.querySelectorAll("[data-cat]").forEach(btn => {
    btn.addEventListener("click", () => {
      activeCat = btn.dataset.cat;
      document.querySelectorAll("[data-cat]").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      render();
    });
  });

  // Tag filter
  document.querySelectorAll("[data-tag]").forEach(pill => {
    pill.addEventListener("click", () => {
      activeTag = pill.dataset.tag;
      document.querySelectorAll("[data-tag]").forEach(p => p.classList.remove("active"));
      pill.classList.add("active");
      render();
    });
  });

  // Search
  let searchTimer;
  document.getElementById("search").addEventListener("input", e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      searchQuery = e.target.value.trim();
      render();
    }, 250);
  });

  // Sort
  document.getElementById("sort").addEventListener("change", e => {
    sortOrder = e.target.value;
    render();
  });

  loadData();
</script>
</body>
</html>
